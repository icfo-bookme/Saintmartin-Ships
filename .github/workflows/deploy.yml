name: Deploy SundarbanShips

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "✅ Setting Git safe directory..."
            git config --global --add safe.directory /var/www/sundarbanships

            echo "✅ Fixing permissions..."
            sudo chown -R deploy:deploy /var/www/sundarbanships
            sudo chmod -R 755 /var/www/sundarbanships

            echo "✅ Pull latest code..."
            cd /var/www/sundarbanships
            git reset --hard
            git pull origin main

            echo "✅ Install dependencies..."
            npm install

            echo "✅ Build project..."
            npm run build

            echo "✅ Reload PM2 process using ecosystem.config.js..."
            pm2 describe sundarbanships || pm2 start ecosystem.config.js
            pm2 reload ecosystem.config.js --update-env